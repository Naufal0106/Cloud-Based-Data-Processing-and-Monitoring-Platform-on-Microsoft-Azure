name: Deploy Backend to Azure Functions

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v3

      - name: 'Setup Python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' 

      - name: 'Login via Azure CLI'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 'Configure Azure Functions runtime'
        run: |
          az functionapp config appsettings set \
            --name 'func-backend-monitoring-k11' \
            --resource-group 'RG-Kelompok11' \
            --settings \
              FUNCTIONS_WORKER_RUNTIME=python \
              FUNCTIONS_EXTENSION_VERSION=~4 \
              AzureWebJobsFeatureFlags=EnableWorkerIndexing \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true

      - name: 'Create backend package'
        run: |
          cd src/backend
          printf "[config]\nSCM_DO_BUILD_DURING_DEPLOYMENT = true\n" > .deployment
          zip -r ../../backend.zip . -x '__pycache__/*' '*.pyc'

      - name: 'Deploy to Azure Function'
        run: |
          az functionapp deployment source config-zip \
            --name 'func-backend-monitoring-k11' \
            --resource-group 'RG-Kelompok11' \
            --src backend.zip \
            --build-remote true \
            --timeout 600
          az functionapp restart \
            --name 'func-backend-monitoring-k11' \
            --resource-group 'RG-Kelompok11'

      - name: 'Verify Azure Functions indexing'
        run: |
          for attempt in 1 2 3 4 5 6 7 8; do
            status="$(curl -sS -o /tmp/function-health.json -w '%{http_code}' \
              'https://func-backend-monitoring-k11.azurewebsites.net/api/hello' || true)"
            if [ "$status" = "200" ]; then
              cat /tmp/function-health.json
              exit 0
            fi
            echo "Function health check returned $status, attempt $attempt/8"
            sleep 30
          done
          echo "Azure Functions health check did not pass in time."
          exit 1
